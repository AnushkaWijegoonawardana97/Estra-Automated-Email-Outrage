<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estra Digital</title>
</head>
<body style="margin:0;padding:0;background-color:{{bg}};font-family:{{font}};">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:{{bg}};">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
          <tr>
            <td style="padding-bottom:24px;text-align:center;">
              <p style="margin:0;font-size:28px;font-weight:700;line-height:1.2;">
                <span style="color:{{accent}};">E</span><span style="color:{{text}};">stra</span>
              </p>
              <p style="margin:8px 0 0;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:{{muted}};">
                {{tagline}}
              </p>
            </td>
          </tr>
          <tr>
            <td>
              {{body_content}}
            </td>
          </tr>
          <tr>
            <td style="padding-top:24px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:16px 0;border-top:1px solid #222222;text-align:center;">
                    <p style="margin:0 0 8px;font-size:12px;color:{{muted}};">
                      <a href="{{website_url}}" style="color:{{text}};text-decoration:none;">estradigital.co.uk</a>
                      &nbsp;·&nbsp;
                      <a href="mailto:{{contact_email}}" style="color:{{text}};text-decoration:none;">{{contact_email}}</a>
                    </p>
                    <p style="margin:0 0 8px;font-size:12px;color:{{muted}};">
                      {{social_links_html}}
                    </p>
                    <p style="margin:0;font-size:11px;color:{{muted}};">
                      <a href="{{unsubscribe_url}}" style="color:{{muted}};text-decoration:underline;">Unsubscribe</a>
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
