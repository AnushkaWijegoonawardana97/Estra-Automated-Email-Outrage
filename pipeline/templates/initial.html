<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:{{card}};border:1px solid {{border}};border-radius:20px;">
  <tr>
    <td style="padding:28px 24px;">
      {{greeting_html}}
      {{pitch_html}}
      <p style="margin:0 0 24px;font-size:14px;line-height:1.6;color:{{muted}};">
        We're <strong style="color:{{text}};">{{brand_name}}</strong>: design, development, security &amp; AI.
        150+ projects shipped for businesses like yours.
      </p>
      {{primary_cta_html}}
      <p style="margin:16px 0 0;text-align:center;font-size:14px;line-height:2;">
        {{secondary_links_html}}
      </p>
      <p style="margin:16px 0 0;text-align:center;font-size:14px;line-height:1.8;color:{{text}};">
        {{service_links_html}}
      </p>
      {{reply_html}}
    </td>
  </tr>
</table>
